<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Todolist - เข้าสู่ระบบ</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Team Todolist</h1>
        <p>จัดการงานร่วมกันในทีม</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">ชื่อผู้ใช้</label>
          <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้" required>
        </div>
        <div class="form-group">
          <label for="password">รหัสผ่าน</label>
          <input type="password" id="password" placeholder="กรอกรหัสผ่าน" required>
        </div>
        <div id="errorMsg" class="error-msg"></div>
        <button type="submit" class="btn btn-primary btn-full">เข้าสู่ระบบ</button>
      </form>
      <div class="auth-footer">
        <p>ยังไม่มีบัญชี? <a href="/register.html">สมัครสมาชิก</a></p>
      </div>
      <div class="demo-info">
        <p><strong>บัญชีทดสอบ:</strong></p>
        <p>Admin: admin / admin123</p>
        <p>User: user1 / user123</p>
      </div>
    </div>
  </div>
  <script src="/js/auth.js"></script>
</body>
</html>
