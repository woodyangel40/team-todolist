<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Todolist - Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">Team Todolist</div>
    <div class="nav-user">
      <button id="darkModeToggle" class="icon-btn" title="Dark Mode">🌙</button>
      <span id="currentUser"></span>
      <span id="userRole" class="role-badge"></span>
      <button id="manageUsersBtn" class="btn btn-outline btn-sm" style="display:none">จัดการผู้ใช้</button>
      <button id="manageTagsBtn" class="btn btn-outline btn-sm" style="display:none">จัดการแท็ก</button>
      <button id="logoutBtn" class="btn btn-outline btn-sm" onclick="localStorage.removeItem('currentUser'); window.location.href='/';">ออกจากระบบ</button>
    </div>
  </nav>

  <div class="container">
    <div class="stats-board" id="statsBoard">
      <div class="stat-card stat-total">
        <div class="stat-number" id="statTotal">0</div>
        <div class="stat-label">งานทั้งหมด</div>
      </div>
      <div class="stat-card stat-overdue">
        <div class="stat-number" id="statOverdue">0</div>
        <div class="stat-label">เกินกำหนด</div>
      </div>
      <div class="stat-card stat-inprogress">
        <div class="stat-number" id="statInProgress">0</div>
        <div class="stat-label">กำลังทำ</div>
      </div>
      <div class="stat-card stat-done">
        <div class="stat-number" id="statDone">0</div>
        <div class="stat-label">เสร็จแล้ว</div>
      </div>
      <div class="stat-card stat-completion">
        <div class="stat-number" id="statCompletion">0%</div>
        <div class="stat-label">อัตราสำเร็จ</div>
      </div>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <h2>งานของทีม</h2>
        <span id="taskCount" class="badge">0 งาน</span>
      </div>
      <div class="toolbar-right">
        <input type="text" id="searchInput" placeholder="ค้นหางาน..." class="search-input">
        <select id="filterStatus" class="filter-select">
          <option value="all">ทุกสถานะ</option>
          <option value="todo">รอดำเนินการ</option>
          <option value="in-progress">กำลังทำ</option>
          <option value="done">เสร็จแล้ว</option>
        </select>
        <select id="filterPriority" class="filter-select">
          <option value="all">ทุกความสำคัญ</option>
          <option value="high">สูง</option>
          <option value="medium">ปานกลาง</option>
          <option value="low">ต่ำ</option>
        </select>
        <select id="filterAssignee" class="filter-select">
          <option value="all">ทุกคน</option>
        </select>
        <button id="addTaskBtn" class="btn btn-primary">+ เพิ่มงานใหม่</button>
      </div>
    </div>

    <div class="board">
      <div class="column" data-status="todo">
        <div class="column-header">
          <h3>รอดำเนินการ</h3>
          <span class="column-count" id="todoCount">0</span>
        </div>
        <div class="task-list" id="todoList"></div>
      </div>
      <div class="column" data-status="in-progress">
        <div class="column-header">
          <h3>กำลังทำ</h3>
          <span class="column-count" id="inProgressCount">0</span>
        </div>
        <div class="task-list" id="inProgressList"></div>
      </div>
      <div class="column" data-status="done">
        <div class="column-header">
          <h3>เสร็จแล้ว</h3>
          <span class="column-count" id="doneCount">0</span>
        </div>
        <div class="task-list" id="doneList"></div>
      </div>
    </div>
  </div>

  <!-- Task Modal -->
  <div id="taskModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">เพิ่มงานใหม่</h3>
        <button class="modal-close" id="closeModal">&times;</button>
      </div>
      <form id="taskForm">
        <input type="hidden" id="taskId">
        <div class="form-group">
          <label for="taskTitle">ชื่องาน *</label>
          <input type="text" id="taskTitle" placeholder="กรอกชื่องาน" required>
        </div>
        <div class="form-group">
          <label for="taskDescription">รายละเอียด</label>
          <textarea id="taskDescription" placeholder="กรอกรายละเอียดงาน" rows="3"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="taskAssignee">ผู้รับผิดชอบ</label>
            <select id="taskAssignee"><option value="">-- ไม่ระบุ --</option></select>
          </div>
          <div class="form-group">
            <label for="taskPriority">ความสำคัญ</label>
            <select id="taskPriority">
              <option value="low">ต่ำ</option>
              <option value="medium" selected>ปานกลาง</option>
              <option value="high">สูง</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="taskStatus">สถานะ</label>
            <select id="taskStatus">
              <option value="todo">รอดำเนินการ</option>
              <option value="in-progress">กำลังทำ</option>
              <option value="done">เสร็จแล้ว</option>
            </select>
          </div>
          <div class="form-group">
            <label for="taskDueDate">วันครบกำหนด</label>
            <input type="date" id="taskDueDate">
          </div>
        </div>
        <div class="form-group">
          <label>แท็ก</label>
          <div id="taskTags" class="tag-selector"></div>
        </div>
        <div id="commentsSection" class="comments-section" style="display:none">
          <label>คอมเมนต์</label>
          <div id="commentsList" class="comments-list"></div>
          <div class="comment-input-row">
            <input type="text" id="commentInput" placeholder="พิมพ์คอมเมนต์..." class="search-input" style="flex:1">
            <button type="button" id="addCommentBtn" class="btn btn-primary btn-sm">ส่ง</button>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline" id="cancelBtn">ยกเลิก</button>
          <button type="submit" class="btn btn-primary">บันทึก</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Confirm Delete Modal -->
  <div id="confirmModal" class="modal">
    <div class="modal-content modal-small">
      <div class="modal-header">
        <h3>ยืนยันการลบ</h3>
        <button class="modal-close" id="closeConfirmModal">&times;</button>
      </div>
      <p id="confirmMessage">คุณต้องการลบงานนี้ใช่หรือไม่?</p>
      <div class="form-actions">
        <button class="btn btn-outline" id="cancelDelete">ยกเลิก</button>
        <button class="btn btn-danger" id="confirmDelete">ลบ</button>
      </div>
    </div>
  </div>

  <!-- User Management Modal -->
  <div id="userModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>จัดการผู้ใช้</h3>
        <button class="modal-close" id="closeUserModal">&times;</button>
      </div>
      <div id="userList" class="user-list"></div>
    </div>
  </div>

  <!-- Change Password Modal -->
  <div id="passwordModal" class="modal">
    <div class="modal-content modal-small">
      <div class="modal-header">
        <h3>เปลี่ยนรหัสผ่าน</h3>
        <button class="modal-close" id="closePasswordModal">&times;</button>
      </div>
      <form id="passwordForm">
        <input type="hidden" id="passwordUserId">
        <div class="form-group">
          <label>รหัสผ่านเดิม</label>
          <input type="password" id="currentPassword" required>
        </div>
        <div class="form-group">
          <label>รหัสผ่านใหม่</label>
          <input type="password" id="newPassword" required>
        </div>
        <div id="passwordError" class="error-msg"></div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline" id="cancelPassword">ยกเลิก</button>
          <button type="submit" class="btn btn-primary">บันทึก</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Tag Management Modal -->
  <div id="tagModal" class="modal">
    <div class="modal-content modal-small">
      <div class="modal-header">
        <h3>จัดการแท็ก</h3>
        <button class="modal-close" id="closeTagModal">&times;</button>
      </div>
      <div style="padding:16px">
        <div class="form-row" style="margin-bottom:12px">
          <input type="text" id="newTagName" placeholder="ชื่อแท็กใหม่" class="search-input" style="flex:1">
          <input type="color" id="newTagColor" value="#667eea" style="width:44px;height:38px;border:none;cursor:pointer;border-radius:8px">
          <button id="addTagBtn" class="btn btn-primary btn-sm">เพิ่ม</button>
        </div>
        <div id="tagListAdmin" class="tag-list-admin"></div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="/js/app.js"></script>
</body>
</html>
